# SwiftLint Configuration for SPX
# Rules: file max 1000 lines, function max 40 lines, complexity max 10

# Disabled rules
disabled_rules:
  - trailing_whitespace
  - blanket_disable_command
  - implicit_return
  - multiple_closures_with_trailing_closure
  - redundant_string_enum_value

# Enabled opt-in rules
opt_in_rules:
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - file_name_no_space
  - first_where
  - force_unwrapping
  - identical_operands
  - joined_default_parameter
  - legacy_random
  - lower_acl_than_parent
  - modifier_order
  - nslocalizedstring_key
  - object_literal
  - overridden_super_call
  - prefer_zero_over_explicit_init
  - reduce_boolean
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - static_operator
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces

# Identifier name (with min_length to avoid single-char names)
identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 40
    error: 60
  excluded:
    - id
    - x
    - y

# File length rule
file_length:
  warning: 1000
  error: 1000

# Function body length (warning > error)
function_body_length:
  warning: 50
  error: 40

# Cyclomatic complexity
cyclomatic_complexity:
  warning: 10
  error: 10

# Line length
line_length:
  warning: 120
  error: 140

# Type body length
type_body_length:
  warning: 400
  error: 500

# Exclude directories
excluded:
  - .build
  - Package.swift
