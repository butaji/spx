# SwiftLint Configuration for SPX
# Rules: file max 1000 lines, function max 40 lines, complexity max 10

# Disabled rules
disabled_rules:
  - trailing_whitespace
  - todo

# Enabled opt-in rules
opt_in_rules:
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - file_name_no_space
  - first_where
  - force_unwrapping
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - legacy_random
  - lower_acl_than_parent
  - modifier_order
  - nslocalizedstring_key
  - object_literal
  - overridden_super_call
  - prefer_zero_over_explicit_init
  - reduce_boolean
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - static_operator
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - unused_import
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces

# File length rule
file_length:
  warning: 800
  error: 1000

# Function body length
function_body_length:
  warning: 30
  error: 40

# Cyclomatic complexity
cyclomatic_complexity:
  warning: 8
  error: 10

# Line length
line_length:
  warning: 120
  error: 140

# Type body length
type_body_length:
  warning: 300
  error: 400

# Exclude directories
excluded:
  - .build
  - Tests
  - Package.swift
