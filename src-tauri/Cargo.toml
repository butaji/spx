[package]
name = "spx"
version = "0.1.0"
description = "Retro Spotify client"
authors = ["SPX"]
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "spx_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
dotenvy = "0.15"
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-shell = "2"
tokio = { version = "1", features = ["net", "io-util", "time"] }
urlencoding = "2"

[profile.release]
strip = true
lto = true
opt-level = "s"
