[package]
name = "spx"
version = "0.1.0"
description = "Retro Spotify client"
authors = ["SPX"]
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "spx_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
dotenvy = "0.15"
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-shell = "2"
tauri-plugin-store = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["net", "io-util", "time", "process"] }
urlencoding = "2"
mdns-sd = "0.13"
rust_cast = "0.21"
rustls = { version = "0.23", features = ["aws-lc-rs", "std"] }
reqwest = { version = "0.12", features = ["rustls-tls"] }

[profile.release]
strip = true
lto = true
opt-level = "s"
